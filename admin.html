<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Manage Gallery — Ukweli Ministries</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="assets/um-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{margin:0;background:#F7F2EA;color:#5B5044;font-family:'Hanken Grotesk',sans-serif;-webkit-font-smoothing:antialiased}
a{color:inherit}
[hidden]{display:none!important}
.wrap{max-width:900px;margin:0 auto;padding:56px 32px 96px}
h1{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(36px,5vw,56px);line-height:1.04;color:#211A12;margin:0 0 10px}
.kicker{font:600 12px/1 'Hanken Grotesk',sans-serif;letter-spacing:.2em;text-transform:uppercase;color:#B0542F;margin-bottom:14px}
label{display:block;font:600 12.5px/1 'Hanken Grotesk',sans-serif;letter-spacing:.08em;text-transform:uppercase;color:#8A7C68;margin:18px 0 8px}
input[type=text],input[type=password],select{width:100%;padding:14px 16px;border:1px solid #E0D6C4;background:#FBF8F2;border-radius:14px;font:500 15px/1 'Hanken Grotesk',sans-serif;color:#211A12;outline:none;transition:border-color .18s}
input:focus,select:focus{border-color:#B0542F}
input[type=file]{font:500 14px/1.4 'Hanken Grotesk',sans-serif;color:#5B5044}
.btn{display:inline-flex;align-items:center;gap:9px;padding:15px 28px;background:#B0542F;color:#FBF8F2;font:600 15px/1 'Hanken Grotesk',sans-serif;border:none;border-radius:14px;cursor:pointer;transition:filter .18s,transform .18s}
.btn:hover{filter:brightness(.93);transform:translateY(-1px)}
.btn[disabled]{opacity:.6;cursor:wait;transform:none}
.card{background:#FBF8F2;border:1px solid #EAE1D1;border-radius:22px;padding:28px}
.msg{margin-top:16px;padding:13px 16px;border-radius:12px;font:500 14px/1.5 'Hanken Grotesk',sans-serif}
.msg.ok{background:#EAF0E2;border:1px solid #C9D6B8;color:#3F5230}
.msg.err{background:#F5E4DE;border:1px solid #E4C2B5;color:#8A3A2E}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-top:22px}
.tile{border:1px solid #EAE1D1;border-radius:14px;overflow:hidden;background:#FBF8F2}
.tile img{width:100%;aspect-ratio:4/5;object-fit:cover;display:block}
.tile .meta{padding:10px 12px}
.tile .t{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:17px;color:#211A12}
.tile .c{font:500 12px/1.4 'Hanken Grotesk',sans-serif;color:#8A7C68;margin-top:2px}
.tile button{margin:0 12px 12px;padding:8px 13px;background:transparent;border:1px solid rgba(138,58,46,.4);color:#8A3A2E;border-radius:10px;font:600 12.5px/1 'Hanken Grotesk',sans-serif;cursor:pointer}
.tile button:hover{background:#8A3A2E;color:#FBF8F2}
.note{font:500 13.5px/1.6 'Hanken Grotesk',sans-serif;color:#8A7C68}
</style>
</head>
<body>
<div class="wrap">
<div class="kicker">Ukweli Ministries · Admin</div>
<h1>Manage the gallery</h1>
<p class="note">Uploads go live on the <a href="gallery.html">Gallery</a> page immediately. This page needs the Rust server running and the admin token (printed by the server at startup, or set via <code>UKWELI_ADMIN_TOKEN</code>).</p>

<div class="card" style="margin-top:28px">
<form id="up-form">
<label for="token">Admin token</label>
<input type="password" id="token" autocomplete="off" placeholder="paste the admin token">
<label for="photo">Photo or video (JPEG/PNG/WebP up to 20 MB · MP4/MOV/WebM up to 500 MB)</label>
<input type="file" id="photo" accept="image/jpeg,image/png,image/webp,video/mp4,video/webm,video/quicktime">
<label for="cat">Category</label>
<select id="cat">
<option>Worship</option>
<option>Community</option>
<option selected>Missions</option>
<option>Media</option>
<option>Tech</option>
<option>Peace</option>
</select>
<label for="label">Title</label>
<input type="text" id="label" maxlength="80" placeholder="e.g. Street preaching">
<label for="cap">Caption</label>
<input type="text" id="cap" maxlength="140" placeholder="e.g. Open-air outreach in Tanzania">
<div style="margin-top:24px"><button type="submit" class="btn" id="up-btn">Upload</button></div>
</form>
<div id="msg" class="msg" hidden></div>
</div>

<h2 style="font-family:'Cormorant Garamond',serif;font-weight:500;font-size:30px;color:#211A12;margin:44px 0 6px">Uploaded photos</h2>
<p class="note" id="list-note">Loading…</p>
<div class="grid" id="list"></div>
</div>

<script>
(function () {
  var tokenEl = document.getElementById('token');
  var msg = document.getElementById('msg');
  var list = document.getElementById('list');
  var listNote = document.getElementById('list-note');
  var btn = document.getElementById('up-btn');

  try { tokenEl.value = sessionStorage.getItem('ukweli_admin_token') || ''; } catch (e) {}

  function show(kind, text) {
    msg.className = 'msg ' + kind;
    msg.textContent = text;
    msg.hidden = false;
  }

  function refresh() {
    fetch('/api/gallery')
      .then(function (r) { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(function (photos) {
        list.textContent = '';
        listNote.textContent = photos.length ? photos.length + ' item(s) uploaded from the site.' : 'Nothing uploaded yet.';
        photos.forEach(function (p) {
          var tile = document.createElement('div');
          tile.className = 'tile';
          var img;
          if (p.kind === 'video') {
            img = document.createElement('video');
            img.src = p.img + '#t=0.1';
            img.muted = true; img.playsInline = true; img.preload = 'metadata'; img.controls = true;
            img.style.cssText = 'width:100%;aspect-ratio:4/5;object-fit:cover;display:block;background:#211A12';
          } else {
            img = document.createElement('img');
            img.src = p.img; img.alt = p.label; img.loading = 'lazy';
          }
          var meta = document.createElement('div');
          meta.className = 'meta';
          var t = document.createElement('div'); t.className = 't'; t.textContent = p.label;
          var c = document.createElement('div'); c.className = 'c'; c.textContent = p.cat + ' · ' + p.cap;
          meta.appendChild(t); meta.appendChild(c);
          var del = document.createElement('button');
          del.textContent = 'Delete';
          del.addEventListener('click', function () {
            if (!confirm('Delete "' + p.label + '" from the gallery?')) return;
            fetch('/api/delete', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ token: tokenEl.value.trim(), id: p.id })
            }).then(function (r) {
              if (r.status === 401) throw new Error('Invalid admin token.');
              if (!r.ok) throw new Error('Delete failed (' + r.status + ').');
              refresh();
            }).catch(function (e2) { show('err', e2.message); });
          });
          tile.appendChild(img); tile.appendChild(meta); tile.appendChild(del);
          list.appendChild(tile);
        });
      })
      .catch(function () { listNote.textContent = 'Could not reach the server — is the Rust backend running?'; });
  }

  document.getElementById('up-form').addEventListener('submit', function (e) {
    e.preventDefault();
    msg.hidden = true;
    var token = tokenEl.value.trim();
    var file = document.getElementById('photo').files[0];
    var label = document.getElementById('label').value.trim();
    if (!token) return show('err', 'Enter the admin token.');
    if (!file) return show('err', 'Choose a photo to upload.');
    if (!label) return show('err', 'Give the photo a title.');
    try { sessionStorage.setItem('ukweli_admin_token', token); } catch (e2) {}

    var fd = new FormData();
    fd.append('token', token);
    fd.append('cat', document.getElementById('cat').value);
    fd.append('label', label);
    fd.append('cap', document.getElementById('cap').value.trim());
    fd.append('photo', file);

    btn.disabled = true;
    fetch('/api/upload', { method: 'POST', body: fd })
      .then(function (r) {
        if (r.status === 401) throw new Error('Invalid admin token.');
        if (!r.ok) return r.text().then(function (t) { throw new Error(t || ('Upload failed (' + r.status + ')')); });
        return r.json();
      })
      .then(function (p) {
        show('ok', '"' + p.label + '" uploaded — it is live in the gallery.');
        document.getElementById('up-form').reset();
        tokenEl.value = token;
        refresh();
      })
      .catch(function (e2) { show('err', e2.message); })
      .finally(function () { btn.disabled = false; });
  });

  refresh();
})();
</script>
</body>
</html>
